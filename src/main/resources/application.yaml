spring:
  application:
    name: app
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_RESTAURANT_DB}
    username: ${MYSQL_RESTAURANT_USER}
    password: ${MYSQL_RESTAURANT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
        ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
        host: localhost
        port: 6379
        password: ${REDIS_RESTAURANT_PASS}
